name: MLOps pipeline

on:
  workflow_dispatch:

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r superkart-sales-forecast/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env: 
          HUGGING_FACE_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart-sales-forecast/model-building/data-register.py

  prep:
    runs-on: ubuntu-latest
    needs: register-dataset
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r superkart-sales-forecast/requirements.txt
      - name: Run Data Preprocessing and Preparation
        env: 
          HUGGING_FACE_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart-sales-forecast/model-building/prep.py

  train:
    runs-on: ubuntu-latest
    needs: prep
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r superkart-sales-forecast/requirements.txt
      - name: Model Building
        env:
          HUGGING_FACE_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart-sales-forecast/model-building/train.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [train, prep, register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r superkart-sales-forecast/requirements.txt
      - name: Push files to frontend Hugging Face Space
        env:
          HUGGING_FACE_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python superkart-sales-forecast/hosting/hosting.py
