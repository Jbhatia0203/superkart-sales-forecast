name: MLOps pipeline

on:
  workflow_dispatch:

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r mlops/requirements.txt
      - name: Login to Hugging Face Hub
        run: huggingface-cli login --token ${{ secrets.HF_TOKEN }}
      - name: Upload Dataset to Hugging Face Hub
        env: 
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mlops/model-building/data-register.py

  prep:
    runs-on: ubuntu-latest
    needs: register-dataset
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r mlops/requirements.txt
      - name: Run Data Preprocessing and Preparation
        env: 
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mlops/model-building/prep.py

  train:
    runs-on: ubuntu-latest
    needs: prep
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r mlops/requirements.txt
      - name: Model Building
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mlops/model-building/train.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [train, prep, register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r mlops/requirements.txt
      - name: Push files to frontend Hugging Face Space
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mlops/hosting/hosting.py
